<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07182d">
  <meta name="description" content="Assistente Pessoal VIP — sistema operacional pessoal modular, privado e offline-first.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Assistente Pessoal VIP</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192.png">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="appShell" class="app-shell" hidden>
    <aside class="sidebar" aria-label="Navegação principal">
      <a class="brand" href="#agora" aria-label="Assistente Pessoal VIP">
        <img src="./assets/icon-192.png" alt="">
        <span><strong>Assistente Pessoal</strong><small>VIP · Genesis 0.1.2</small></span>
      </a>
      <nav id="desktopNav" class="nav-list"></nav>
      <div class="sidebar-footer">
        <div class="status-pill"><i></i><span>Dados locais</span></div>
        <small>Offline-first · GitHub Pages</small>
      </div>
    </aside>

    <div class="content-area">
      <header class="topbar">
        <div>
          <span class="eyebrow">ASSISTENTE PESSOAL VIP</span>
          <h1 id="pageTitle">AGORA</h1>
        </div>
        <div class="topbar-actions">
          <button id="guideBtn" class="icon-btn" type="button" title="Abrir VIP Guia" aria-label="Abrir VIP Guia">?</button>
          <button id="lockNowBtn" class="icon-btn" type="button" title="Bloquear agora" aria-label="Bloquear agora">⌁</button>
          <button id="themeToggleBtn" class="icon-btn" type="button" title="Alternar tema" aria-label="Alternar tema">◐</button>
          <button id="settingsBtn" class="profile-btn" type="button" title="Configurações" aria-label="Abrir configurações"><span id="profileInitial">V</span></button>
        </div>
      </header>
      <main id="mainContent" tabindex="-1"></main>
    </div>

    <nav id="mobileNav" class="mobile-nav" aria-label="Navegação móvel"></nav>
  </div>

  <section id="onboarding" class="fullscreen-layer" hidden aria-labelledby="onboardingTitle">
    <div class="setup-card">
      <div class="setup-brand"><img src="./assets/icon-192.png" alt=""><span>Configuração inicial</span></div>
      <div class="setup-progress" aria-label="Progresso"><i id="setupProgress"></i></div>
      <div id="setupBody"></div>
    </div>
  </section>

  <section id="lockScreen" class="fullscreen-layer lock-layer" hidden aria-labelledby="lockTitle">
    <form id="unlockForm" class="lock-card">
      <img src="./assets/icon-192.png" alt="">
      <span class="eyebrow">ÁREA PRIVADA</span>
      <h2 id="lockTitle">Assistente Pessoal VIP</h2>
      <p id="lockGreeting">Digite seu PIN para continuar.</p>
      <label class="field"><span>PIN</span><input id="unlockPin" inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="current-password" type="password" required></label>
      <button class="btn btn-primary btn-full" type="submit">Desbloquear</button>
      <small id="lockMessage" class="form-message" aria-live="polite"></small>
    </form>
  </section>

  <dialog id="modal" class="modal"><div id="modalContent"></div></dialog>
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>
  <input id="importFileInput" type="file" accept="application/json" hidden>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
